version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dfs_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: gateway-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - AUTH_SERVICE_URL=http://auth-service:8081
      - METADATA_SERVICE_URL=http://metadata-service:8082
      - STORAGE_SERVICE_URL=http://storage-node-1:8083
    depends_on:
      - auth-service
      - metadata-service
      - storage-node-1

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: auth-service
    environment:
      - PORT=8081
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dfs_db}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_change_in_prod}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  metadata-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: metadata-service
    environment:
      - PORT=8082
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dfs_db}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy

  storage-node-1:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: storage-node
    environment:
      - PORT=8083
      - STORAGE_DIR=/data
    volumes:
      - storage-data-1:/data

  sync-service:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        SERVICE: sync-service
    environment:
      - PORT=8084
      - REDIS_URL=redis://redis:6379

volumes:
  pgdata:
  redisdata:
  storage-data-1:
